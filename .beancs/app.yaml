apiVersion: beancs.io/v1alpha1
kind: Application
metadata:
  name: california-beans
  displayName: California Beans
spec:
  type: monorepo
  repo:
    provider: github
    name: zeturn/CaliforniaBeans
    branch: master
  namespace:
    strategy: shared
    name: app-california-beans
  autoDeploy:
    enabled: true
    mode: affected-components
  dependencies:
    - name: mysql268
      type: mysql
      existingDependencyID: 34
  components:
    - name: web
      kind: service
      projectName: california-beans
      build:
        context: .
        dockerfile: Dockerfile
      ports:
        - name: http
          port: 8080
          protocol: http
          exposure: public
      healthCheck:
        type: http
        path: /health
        port: http
      envFromDependencies:
        - dependency: mysql268
          dependencyID: 34
          credential: zet
          credentialID: 45
          preset: mysql_default
      watchPaths:
        - app.py
        - Dockerfile
        - requirements.txt
